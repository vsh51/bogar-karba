services:

  # PostgreSQL
  db:
    image: postgres:17-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # .NET Core
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy

  # Adminer
  adminer:
    image: adminer:4
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: nette
    ports:
      - "5050:8080"
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  backend:   # db - app - adminer
  frontend:  # app and adminer exposed to the host
