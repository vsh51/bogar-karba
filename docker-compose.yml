services:

  # PostgreSQL
  db:
    image: postgres:17-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # .NET Core
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy

  # Adminer
  adminer:
    image: adminer:4
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: nette
    ports:
      - "5050:8080"
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy

  # Seq
  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_FIRSTRUN_ADMINPASSWORD:-admin12345}
    ports:
      - "8081:80"
      - "5341:5341"
    networks:
      - backend
      - frontend
    volumes:
      - seq_data:/data

volumes:
  postgres_data:
  seq_data:

networks:
  backend:   # db - app - adminer - seq
  frontend:  # app, adminer and seq exposed to the host
